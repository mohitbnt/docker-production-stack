# OpsPortal Redis configuration

bind 0.0.0.0
port 6379
protected-mode no
timeout 300
tcp-keepalive 60

# Persistence: RDB snapshots (adjust for your workload)
save 900 1
save 300 10
save 60 10000

# Memory policy for cache workloads
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Databases
databases 16

# AOF (disabled – cache workload)
appendonly no