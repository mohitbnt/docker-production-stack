name: Continuous Integration / Continuous Deployment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compose

    env:
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      IMAGE_VERSION: ${{ github.sha }}

      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}

      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create runtime environment files
        run: |
          cp .env.example .env
          cp backend.env.example backend.env
          cp frontend.env.example frontend.env
          cp postgres.env.example postgres.env
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: validate docker-compose files
        run: docker compose -f docker-compose.yaml config

      - name: Build images
        run: docker compose build

      - name: Push images
        run: docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      IMAGE_VERSION: ${{ github.sha }}

      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
 
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          envs: IMAGE_VERSION,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,SEED_ADMIN_EMAIL,SEED_ADMIN_PASSWORD
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/opsportal
            git pull origin main
            cd compose
            cp .env.example .env
            cp backend.env.example backend.env
            cp frontend.env.example frontend.env
            cp postgres.env.example postgres.env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
        