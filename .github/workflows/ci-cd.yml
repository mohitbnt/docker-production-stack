name: Continuous Integration / Continuous Deployment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main    

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compose

    env:
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      IMAGE_VERSION: ${{ github.sha }}

      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}

      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create runtime environment files
        run: |
          cp .env.example .env
          cp backend.env.example backend.env
          cp frontend.env.example frontend.env
          cp postgres.env.example postgres.env
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: validate docker-compose files
        run: docker compose -f docker-compose.yaml config

      - name: Build images
        run: docker compose build

      - name: Push images
        run: docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions: 
      contents: read
      id-token: write
    if: github.event_name == 'push'
    steps:
      - name: Configure AWS Credentials for OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-OpsPortal-Deploy
          
      - name: Deploy to EC2 instance via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying version ${{ github.sha }} from GitHub Actions" \
            --parameters '{
              "commands": [
                "set -e",
                "mkdir /opt/opsportal",
                "cd /opt/opsportal",
                "git pull origin main",
                "cd compose",
                "cp .env.example .env",
                "cp backend.env.example backend.env",
                "cp frontend.env.example frontend.env",
                "cp postgres.env.example postgres.env",
                "export IMAGE_VERSION=\"${{ github.sha }}\"",
                "export POSTGRES_DB=\"${{ vars.POSTGRES_DB }}\"",
                "export POSTGRES_USER=\"${{ vars.POSTGRES_USER }}\"",
                "export POSTGRES_PASSWORD=\"${{ secrets.POSTGRES_PASSWORD }}\"",
                "export SEED_ADMIN_EMAIL=\"${{ vars.SEED_ADMIN_EMAIL }}\"",
                "export SEED_ADMIN_PASSWORD=\"${{ secrets.SEED_ADMIN_PASSWORD }}\"",
                "docker compose pull",
                "docker compose up -d --remove-orphans",
                "docker image prune -f"
              ]
            }'    
