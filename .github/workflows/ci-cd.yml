name: Continuous Integration / Continuous Deployment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main    

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compose

    env:
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      IMAGE_VERSION: ${{ github.sha }}

      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}

      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create runtime environment files
        run: |
          cp .env.example .env
          cp backend.env.example backend.env
          cp frontend.env.example frontend.env
          cp postgres.env.example postgres.env
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: validate docker-compose files
        run: docker compose -f docker-compose.yaml config

      - name: Build images
        run: docker compose build

      - name: Push images
        run: docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions: 
      contents: read
      id-token: write
    if: github.event_name == 'push'
    steps:
      - name: Configure AWS Credentials for OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-OpsPortal-Deploy

      - name: Deploy to EC2 instance via SSM
        timeout-minutes: 15
        run: |
          INSTANCE_ID="${{ vars.EC2_INSTANCE_ID }}"

          # 1. Store the exact shell commands safely as a multi-line string
          EXECUTION_SCRIPT=$(cat << 'EOF'
          set -euxo pipefail
          mkdir -p /opt/Opsportal
          cd /opt/Opsportal

          if [ ! -d ".git" ]; then
              git clone https://github.com/mohitbnt/OpsPortal.git .
          else
              git fetch origin
              git reset --hard origin/main
          fi

          cd compose
          cp -n .env.example .env || true
          cp -n backend.env.example backend.env || true
          cp -n frontend.env.example frontend.env || true
          cp -n postgres.env.example postgres.env || true

          # Pass values directly down into the docker compose runtime execution environment
          export IMAGE_VERSION="${{ github.sha }}"
          export POSTGRES_DB="${{ vars.POSTGRES_DB }}"
          export POSTGRES_USER="${{ vars.POSTGRES_USER }}"
          export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
          export SEED_ADMIN_EMAIL="${{ vars.SEED_ADMIN_EMAIL }}"
          export SEED_ADMIN_PASSWORD="${{ secrets.SEED_ADMIN_PASSWORD }}"

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
          )

          # 2. Package the execution script into a valid JSON payload using jq
          PAYLOAD=$(jq -n --arg cmd "$EXECUTION_SCRIPT" '{commands: [$cmd], executionTimeout: ["600"]}')

          echo "🚀 Sending deployment command via AWS SSM..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying version ${{ github.sha }} from GitHub Actions" \
            --parameters "$PAYLOAD" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command triggered. ID: $COMMAND_ID"
          echo "Waiting for remote deployment loop to complete..."

          # 3. Wait for execution to finish on the server
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || echo "Waiter finished with errors or command failed. Fetching logs..."

          # 4. Gather execution metrics and outputs
          INVOCATION_JSON=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json)

          STATUS=$(echo "$INVOCATION_JSON" | jq -r '.Status')
          STDOUT=$(echo "$INVOCATION_JSON" | jq -r '.StandardOutputContent')
          STDERR=$(echo "$INVOCATION_JSON" | jq -r '.StandardErrorContent')

          echo "=== DEPLOYMENT OUTPUT ==="
          printf '%s\n' "$STDOUT"

          if [ "$STDERR" != "null" ] && [ -n "$STDERR" ]; then
            echo "=== DEPLOYMENT ERRORS ==="
            printf '%s\n' "$STDERR"
          fi

          echo "Final SSM Agent Status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "Deployment step failed on the EC2 host."
            exit 1
          fi
