name: Continuous Integration / Continuous Deployment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compose

    env:
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      IMAGE_VERSION: ${{ github.sha }}

      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
      SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}

      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create runtime environment files
        run: |
          cp .env.example .env
          cp backend.env.example backend.env
          cp frontend.env.example frontend.env
          cp postgres.env.example postgres.env

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate docker-compose files
        run: docker compose -f docker-compose.yaml config

      - name: Build images
        run: docker compose build

      - name: Push images
        run: docker compose push

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS Credentials for OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-OpsPortal-Deploy

      - name: Deploy to EC2 instance via SSM
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE_VERSION: ${{ github.sha }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SEED_ADMIN_EMAIL: ${{ vars.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD: ${{ secrets.SEED_ADMIN_PASSWORD }}
        run: |
          # Build the parameters JSON safely with jq so secrets/vars are escaped
          PARAMS=$(jq -n \
            --arg image_version "$IMAGE_VERSION" \
            --arg postgres_db "$POSTGRES_DB" \
            --arg postgres_user "$POSTGRES_USER" \
            --arg postgres_password "$POSTGRES_PASSWORD" \
            --arg seed_admin_email "$SEED_ADMIN_EMAIL" \
            --arg seed_admin_password "$SEED_ADMIN_PASSWORD" \
            '{
              commands: [
                "set -e",
                "cd /opt/opsportal",
                "git pull origin main",
                "cd compose",
                "cp .env.example .env",
                "cp backend.env.example backend.env",
                "cp frontend.env.example frontend.env",
                "cp postgres.env.example postgres.env",
                ("export IMAGE_VERSION=\"" + $image_version + "\""),
                ("export POSTGRES_DB=\"" + $postgres_db + "\""),
                ("export POSTGRES_USER=\"" + $postgres_user + "\""),
                ("export POSTGRES_PASSWORD=\"" + $postgres_password + "\""),
                ("export SEED_ADMIN_EMAIL=\"" + $seed_admin_email + "\""),
                ("export SEED_ADMIN_PASSWORD=\"" + $seed_admin_password + "\""),
                "docker compose pull",
                "docker compose up -d --remove-orphans",
                "docker image prune -f"
              ]
            }')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying $IMAGE_VERSION from GitHub Actions" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM CommandId: $COMMAND_ID"

          # Wait for the command to finish and surface failures in the workflow
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          echo "Final status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed. StandardErrorContent:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi